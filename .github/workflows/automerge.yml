---
name: Auto merge
on:
  pull_request:
    paths:
      - '**/*.tf'
      - '*.tf'
jobs:
  auto-merge:
    uses: clouddrove/github-shared-workflows/.github/workflows/pr-auto-merge.yml@master
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
    with:
      tfcheck: 'example / Check code format'
...
